model:
  name: "residual_transport_mlp"
  input_dim: 5
  hidden_dim: 192
  n_residual_blocks: 4
  branch_dim: 64
  dropout: 0.10

pretrained:
  checkpoint_path: "checkpoints/pretrain_25521_fry_cuda_5d_notebooklike/best_pretrain.pth"
  scaler_bundle_path: "checkpoints/pretrain_25521_fry_cuda_5d_notebooklike/scaler_bundle.json"

data:
  tree_name: "T"
  feature_schema: ["x_fp", "y_fp", "xp_fp", "yp_fp", "fry"]
  branch_map:
    x_fp: "P_dc_x_fp"
    y_fp: "P_dc_y_fp"
    xp_fp: "P_dc_xp_fp"
    yp_fp: "P_dc_yp_fp"
  direct_fry_branch: "P.rb.raster.fr_ybpm_tar"
  fry_proxy_branches:
    - "P_rb_raster_fryaRawAdc"
    - "P_rb_raster_frybRawAdc"
  fry_mode: "direct_or_proxy"

  # These columns are assumptions for the upcoming 3foils+sieve full ROOT.
  # If the delivered file uses different branch names, only this section
  # needs to be updated.
  label_map:
    delta:
      enabled: true
      center_col: "P_gtr_dp"
      tolerance: 0.0
      reference_branch: "P_gtr_dp"
    xptar:
      enabled: true
      center_col: "weak_hole_xptar_center"
      tol_col: "weak_hole_xptar_tol"
      reference_branch: "P_gtr_th"
    yptar:
      enabled: true
      center_col: "weak_hole_yptar_center"
      tol_col: "weak_hole_yptar_tol"
      reference_branch: "P_gtr_ph"
    ytar:
      enabled: true
      center_col: "weak_foil_ytar_center"
      tol_col: "weak_foil_ytar_tol"
      reference_branch: "P_react_z"

  metadata_cols:
    run_id: "run_id"
    foil_position: "foil_position"
    hole_id: "hole_id"
    hole_row: "hole_row"
    hole_col: "hole_col"

  weight_col: "weak_label_weight"

  cuts:
    use_pid: false
    ngcer_min: 2.0
    hgcer_min: 0.5
    cal_etot_min: 0.6
    cal_etot_max: 1.8
    use_quality: false
    dp_min: -25.0
    dp_max: 22.0
    xptar_abs_max: 0.08
    yptar_abs_max: 0.06
    ytar_abs_max: 120.0

training:
  epochs: 80
  batch_size: 2048
  weight_decay: 1.0e-5
  early_stopping_patience: 20
  gradient_clip_max_norm: 1.0

  # Phase 1: correction head only
  head_learning_rate: 2.0e-4

  # Phase 2: correction branch (projection + residual blocks + head)
  branch_unfreeze_epoch: 20
  branch_learning_rate: 5.0e-5

  # Phase 3: optional global fine-tuning
  full_unfreeze_epoch: 60
  full_learning_rate: 1.0e-5
  keep_linear_path_frozen: true

  val_fraction: 0.2
  random_seed: 42

validation:
  strategy: "leave_one_foil_out"
  foil_column: "foil_position"
  holdout_foil: 1
  random_seed: 42
  val_fraction: 0.2

loss:
  use_huber: true
  huber_delta: 1.0
  correction_l2_weight: 1.0e-4
  target_weights:
    delta: 0.25
    xptar: 1.0
    yptar: 1.0
    ytar: 1.0

output:
  checkpoint_dir: "checkpoints/stage2_transport_fullroot_25521/"
